version: '3.8'

services:
  web:
    build: .
    container_name: salary
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=salary.settings
    volumes:
      - .:/app # ← live code reload
      - sqlite_data:/app/db # ← persist SQLite DB
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  sqlite_data: # ← named volume for DB persistence
